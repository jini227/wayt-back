spring.application.name=wayt-back
spring.config.import=optional:file:.env.local[.properties]
server.port=${PORT:19191}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

spring.datasource.url=${WAYT_DATASOURCE_URL:jdbc:h2:mem:wayt;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
spring.datasource.username=${WAYT_DATASOURCE_USERNAME:sa}
spring.datasource.password=${WAYT_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${WAYT_DATASOURCE_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=${WAYT_JPA_DDL_AUTO:create-drop}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=${WAYT_FLYWAY_ENABLED:false}
spring.h2.console.enabled=${WAYT_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

wayt.app.public-base-url=${WAYT_PUBLIC_BASE_URL:http://localhost:19191}
wayt.auth.mock-token-secret=${WAYT_AUTH_MOCK_TOKEN_SECRET:dev-secret}
wayt.kakao.rest-api-key=${KAKAO_REST_API_KEY:}
wayt.kakao.client-secret=${KAKAO_CLIENT_SECRET:}
wayt.kakao.redirect-uri=${KAKAO_REDIRECT_URI:http://localhost:19191/api/auth/kakao/callback}
wayt.kakao.scopes=${KAKAO_SCOPES:}
wayt.naver.maps.ncp-key-id=${NAVER_MAPS_NCP_KEY_ID:}
wayt.naver.maps.ncp-key=${NAVER_MAPS_NCP_KEY:}
wayt.naver.search.client-id=${NAVER_SEARCH_CLIENT_ID:}
wayt.naver.search.client-secret=${NAVER_SEARCH_CLIENT_SECRET:}
